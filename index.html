<!doctype html>
<html lang="en">
  
<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for play-list-project">

  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
    }
    #demo {
      margin: var(--ddd-spacing-2);
    }
    project-1-insta {
      margin: var(--ddd-spacing-2);
      border: var(--ddd-border-md);
      border-radius: var(--ddd-radius-lg);
      background-color: blue;
    }

    insta-slide{
      align-content: center;
      text-align: center;
      font-size: 200px;
    }

    insta-card{
      display: block;
        /* outline: auto; I'm just keeping this line as I found it by accident and I found the results to be fascinating despite not being what I was going for. */ 
        transform: translateY(-70px);
        width: 1000px;
        height: 800px;
        border: var(--ddd-border-md);
        text-align: center;
      font-size: 200px;
        }

    .glyph{
      align-content: center;
      width: 500px;
      height: 500px;
      margin-bottom: -100px;
    }

    h3{
      text-align: center;
      position: flex;
    }

    hr{
      width: 75px;
      color: white;
    }

    @media (min-width: 500px) and (max-width: 800px){
          project-1-insta {
          margin: var(--ddd-spacing-2);
          border: var(--ddd-border-md);
          border-radius: var(--ddd-radius-lg);
          background-color: blue;
        }

        insta-slide{
          text-align: left;
          font-size: 45px;
          overflow: scroll;
        }

        h3{
          text-align: left;
          position: flex;
        }

        hr{
          width: 75px;
          transform: translateX(5px);
          color: white;
        }
      }
  </style>
  <title>project-1-insta</title>
</head>

<body>
  <div id="demo">
    <h1>project-1-insta</h1>

    <h2>Bottom text</h2>
    <project-1-insta>


      <insta-slide>
        <insta-card>
        <h3>Hello</h3>
        <hr>
        <img class="glyph" src="https://upload.wikimedia.org/wikipedia/commons/d/da/1-Light_glyph.png" alt="Light Glyph from The Owl House"> 
        <p>slide 1</p>
        </insta-card>
      </insta-slide>
      <insta-slide>
        <h3>Hello</h3>
        <hr>
        <img class="glyph" src="https://upload.wikimedia.org/wikipedia/commons/d/da/1-Light_glyph.png" alt="Light Glyph from The Owl House"> 
        <p>slide 2</p>
      </insta-slide>
      <insta-slide> 
        <h3>Hello</h3>
        <hr>
        <p>slide 3</p>
      </insta-slide>
      <insta-slide> 
        <h3>Hello</h3>
        <hr>
        <p>slide 4</p>
      </insta-slide>
      <insta-slide> 
        <h3>Hello</h3>
        <hr>
        <p>slide 5</p>
      </insta-slide>
    </project-1-insta>

  </div>
  <script type="module" src="./project-1-insta.js"></script>
</body>
</html>
